name: Test and deploy

on:
  workflow_dispatch: {}
  pull_request: {}
  push:
    branches:
      - master
      - jeancochrane/setup-aws-staging-instance

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: reallysupersecret
      DJANGO_SETTINGS_MODULE: mbm.settings
      DB_HOST: localhost
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    services:
      postgres:
        image: postgres:11
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_PORT: 5432
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.8
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends gdal-bin
          pip install --upgrade pip
          pip install --upgrade -r app/requirements.txt
      - name: Run Python tests
        run: |
          cp -R tests app/tests
          cd app && pytest
      - name: Run JavaScript tests
        run: |
          cd app && npm test

  set-deploy-target:
    needs: test
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      is_deploy_eligible: ${{ steps.vars.outputs.is_deploy_eligible }}
      app_name: ${{ steps.vars.outputs.app_name }}
      deployment_group: ${{ steps.vars.outputs.deployment_group }}
    env:
      STAGING_REF: refs/heads/jeancochrane/setup-aws-staging-instance
      PROD_REF: refs/heads/master
    steps:
    - name: Set deployment target
      id: vars
      run: |
        if [ "$GITHUB_REF" == "$STAGING_REF" ]; then
          echo "Ref '$GITHUB_REF' matches staging ref, setting deploy target to staging"
          echo "is_deploy_eligible=true" >> $GITHUB_OUTPUT
          echo "app_name=mellow-bike-map-staging" >> $GITHUB_OUTPUT
          echo "deployment_group=staging" >> $GITHUB_OUTPUT
        elif [ "$GITHUB_REF" == "$PROD_REF" ]; then
          echo "Ref '$GITHUB_REF' matches prod ref, setting deploy target to prod"
          echo "is_deploy_eligible=true" >> $GITHUB_OUTPUT
          echo "app_name=mellow-bike-map" >> $GITHUB_OUTPUT
          echo "deployment_group=production" >> $GITHUB_OUTPUT
        else
          echo "Ref '$GITHUB_REF' is not eligible for deployment, skipping deploy"
          echo "is_deploy_eligible=false" >> $GITHUB_OUTPUT
        fi

  deploy:
    needs: set-deploy-target
    if: ${{ github.event_name == 'push' && needs.set-deploy-target.outputs.is_deploy_eligible == 'true' }}
    runs-on: ubuntu-latest
    environment: Dev
    env:
      AWS_REGION: us-east-2
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.IAMROLE_GITHUB }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy app
        run: |
          commit_hash=`git rev-parse HEAD`
          aws deploy create-deployment \
            --application-name "${{ needs.set-deploy-target.outputs.app_name }}" \
            --deployment-group-name "${{ needs.set-deploy-target.outputs.deployment_group }}" \
            --github-location repository=$GITHUB_REPOSITORY,commitId=$commit_hash \
            --ignore-application-stop-failures
